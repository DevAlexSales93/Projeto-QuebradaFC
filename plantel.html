<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Gestão de Time</title>

    <link rel="stylesheet" href="estilo da pagina.css">
</head>
<body>

    <header>
        <img src="imagens/emblema.png" alt="Quebrada FC emblem featuring a black dragon with red accents, colorful favela buildings, four red stars, and text reading DESDE 2026" class="emblema">
        <h1> ⚙️ Gestão de Time</h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="cadastro_jogadores.html">Adicionar Jogadores</a>
            <a href="plantel.html">Gerenciar Time</a>
        </nav>
    </header>

    <main class="container">

        <section class="cadastro">
            <h2>Editar Jogador</h2>

            <input type="hidden" id="editar">

            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome do jogador">
            </div>

            <div class="campo">
                <label for="numero">Número</label>
                <input type="number" id="numero" name="numero" placeholder="Ex: 10">
            </div>

            <div class="campo">
                <label for="posicao">Posição</label>
                <select id="posicao" name="posicao">
                    <option value="">Selecione a posição</option>
                    <option value="Goleiro">Goleiro</option>
                    <option value="Zagueiro">Zagueiro</option>
                    <option value="Lateral">Lateral</option>
                    <option value="Meio-campista">Meio-campista</option>
                    <option value="Atacante">Atacante</option>
                </select>
            </div>

            <button type="button" onclick="cadastrar()">
                Editar Jogador
            </button>

        </section>
</main>

    <footer>
        <img src="imagens/emblema.png" alt="Quebrada FC emblem featuring a black dragon with red accents, colorful favela buildings, four red stars, and text reading DESDE 2026" class="logo">
        <p>Quebrada FC © 2026</p>
        <p>Todos os direitos reservados. Alex Sales ®️</p>
    </footer>

</body>
</html>
