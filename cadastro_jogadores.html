<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cadastro de Jogadores</title>
    <link rel="stylesheet" href="estilo da pagina.css">
</head>
<body>
    <header>
        <img src="imagens/emblema.png" alt="logo" class="emblema">
        <h1> 📝 Cadastro de Jogadores</h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="cadastro_jogadores.html">Gerenciar Jogadores</a>
            <a href="plantel.html">Gerenciar Posições</a>
        </nav>
    </header>

    <div class="container">
        <form>
            <h2>Novo Jogador</h2>

            <label>Nome</label>
            <input type="text" placeholder="Ex: nome do Jogador">

            <label>Altura</label>
            <input type="text" placeholder="Ex: 1.82">

            <label>Posição</label>

            <select>
                <option>Goleiro</option>
                <option>Zagueiro</option>
                <option>Lateral Direito</option>
                <option>Lateral Esquerdo</option>
                <option>Volante</option>
                <option>Meio-Campo</option>
                <option>Ponta Direita</option>
                <option>Ponta Esquerda</option>
                <option>Atacante</option>
            </select>

            <div class="grupo-campos">

    <!-- Campeonato Varzeano -->
    <div class="campo">
        <label for="campeonato">🏆 Campeonato Varzeano</label>
        <select id="campeonato" name="campeonato">
            <option value="">Selecione a divisão</option>
            <option value="serie_a">Série A</option>
            <option value="serie_b">Série B</option>
        </select>
    </div>

    <!-- Amistosos -->
    <div class="campo">
        <label for="amistoso">🤝 Amistosos</label>
        <select id="amistoso" name="amistoso">
            <option value="">Selecione</option>
            <option value="sim">Participará de amistosos</option>
            <option value="nao">Não participará</option>
        </select>
    </div>

    <!-- Torneios Preparatórios -->
    <div class="campo">
        <label for="torneio">🏅 Torneios Preparatórios</label>
        <select id="torneio" name="torneio">
            <option value="">Selecione</option>
            <option value="pre_temporada">Pré-temporada</option>
            <option value="torneio_verao">Torneio de Verão</option>
            <option value="torneio_inverno">Torneio de Inverno</option>
            <option value="copa_preparatoria">Copa Preparatória</option>
            <option value="nao">Não participará</option>
        </select>
    </div>

</div>

</div>

            <label>⌛ Tempo de Contrato</label>
            <input type="text" placeholder="Ex: Dez/2026">
            <button type="submit">Cadastrar Jogador</button>
        </form>
    </div>

    <footer>
        <img src="imagens/emblema.png" alt="logo" class="logo">
        <p>Quebrada FC © 2026</p>
        <p>Todos os direitos reservados. Alex Sales ®️</p>
    </footer>
</body>
</html>
